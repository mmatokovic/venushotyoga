{{ $built := resources.Get "js/index.js" | js.Build "main.js" }}
<!DOCTYPE html>
<html lang="hr">
    {{- partial "head.html" . -}}
    <body class="font-comfortaa">
        {{- partial "header.html" . -}}
        <div id="content">
        {{- block "main" . }}{{- end }}
        </div>
        {{- partial "footer.html" . -}}
        <script src="{{ $built.RelPermalink }}" integrity="{{ $built.Data.Integrity }}" defer></script>
    </body>
</html>
