{{ define "main" }}
<section class="text-gray-600 body-font">
    <div class="container px-5 py-24 mx-auto">
      <div class="flex flex-wrap -m-4">
        {{ range .Data.Pages }}
        <div class="xl:w-1/4 md:w-1/2 p-4">
          <div class="bg-gray-100 p-6 rounded-lg">
            {{ $image := .Page.Resources.GetMatch .Params.image }}
            <a href="{{ .RelPermalink }}"><img class="h-100 rounded w-full object-cover object-center mb-6" src="{{ $image.RelPermalink }}"></a>
            <a href="{{ .RelPermalink }}"><h2 class="text-lg text-gray-900 font-medium title-font mb-4">{{ .Title }}</h2></a>
            <p class="leading-relaxed text-base">{{ .Params.description }}</p>
          </div>
        </div>
        {{ end }}
      </div>
    </div>
</section>
{{ end }}
