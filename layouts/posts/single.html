{{ define "main" }}
<section class="text-gray-600 body-font">
    <div class="container px-5 py-24 mx-auto flex flex-col">
      <div class="lg:w-4/6 mx-auto">
        <h2 class="sm:text-3xl text-2xl title-font font-medium text-gray-900 mt-4 mb-4">{{ .Title }}</h2>
        <div class="flex items-center flex-wrap pb-4 mb-4 border-b-2 border-gray-100 mt-auto w-full">
        <span class="inline-block py-1 px-2 rounded bg-indigo-50 text-indigo-500 text-xs font-medium tracking-widest">{{ .Params.tags }}</span>
        <span class="text-gray-400 mr-3 inline-flex items-center ml-auto leading-none text-sm pr-3 py-1 border-r-2 border-gray-200">
            <svg class="w-4 h-4 mr-1" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>{{ .ReadingTime }} minute čitanja
        </span>
        <span class="text-gray-400 inline-flex items-center leading-none text-sm">
            {{ if .Date }}
                {{ .Date.Format "January 2, 2006" }}
            {{ end }}
        </span>
        </div>
        <div class="rounded-lg h-100 overflow-hidden">
          <img alt="content" class="object-cover object-center h-full w-full" src="{{ .Params.image }}">
        </div>
        <div class="flex flex-col sm:flex-row mt-10">
          <div class="sm:w-5/8 sm:pl-8 sm:py-8 sm:border-l border-gray-200 sm:border-t-0 border-t mt-4 pt-4 sm:mt-0 text-center sm:text-left">
            {{ .Content }}
          </div>
        </div>
      </div>
    </div>
</section>
{{ end }}
