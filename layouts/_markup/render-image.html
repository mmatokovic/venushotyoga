{{- $image := resources.Get .Destination -}}
{{- if $image -}}
  {{- if gt $image.Width 2400 -}}
    {{- $image = $image.Resize "2400x" -}}
  {{- end -}}
  {{- $webp := $image.Resize "1200x webp q75" -}}
  {{- $jpg  := $image.Resize "1200x jpg q80" -}}
  <picture>
    <source srcset="{{ $webp.RelPermalink }}" type="image/webp">
    <source srcset="{{ $jpg.RelPermalink }}" type="image/jpeg">
    <img
      src="{{ $jpg.RelPermalink }}"
      loading="lazy"
      decoding="async"
      {{ with .Text }}alt="{{ . }}"{{ else }}alt="{{ .Page.Title }}"{{ end }}
      {{ with .Title }}title="{{ . }}"{{ end }}
    />
  </picture>
{{- else -}}
  <img
    src="{{ .Destination | safeURL }}"
    loading="lazy"
    decoding="async"
    {{ with .Text }}alt="{{ . }}"{{ else }}alt="{{ .Page.Title }}"{{ end }}
    {{ with .Title }}title="{{ . }}"{{ end }}
  />
{{- end -}}
