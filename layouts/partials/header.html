<header class="text-gray-600 body-font shadow-2xl bg-kaki">
  <div class="container mx-auto flex flex-wrap p-5 flex-col md:flex-row items-center">
    <a class="flex title-font font-medium items-center text-gray-900 mb-4 md:mb-0">
      <a class="" href="{{ .Site.BaseURL | relLangURL }}">
        <img src="/images/icons/cropped-favicon-270x270.png" alt="Logo" width="76" height="76" class="">
      </a>
    </a>
    <nav class="md:mr-auto md:ml-4 md:py-1 md:pl-4 md:border-l md:border-gray-400	flex flex-wrap items-center text-base justify-center">
      {{ range .Site.Menus.main }}
      <a class="mr-5 hover:text-krem cursor-pointer{{ if or ($.IsMenuCurrent "main" . ) ($.HasMenuCurrent "main" .)}} text-krem" aria-current="page{{ end }}" href="{{ .URL }}">{{ .Pre }}<span>{{ .Name }}</span>{{ .Post }}</a>
      {{ end }}
    </nav>
    <a href="/contact/">
      <button class="inline-flex items-center bg-gray-100 border-0 py-1 px-3 focus:outline-none hover:bg-gray-200 rounded text-base mt-4 md:mt-0">Kontakt
        <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="w-4 h-4 ml-1" viewBox="0 0 24 24">
          <path d="M5 12h14M12 5l7 7-7 7"></path>
        </svg>
      </button>
    </a>
  </div>
  <!-- Mobile menu button -->
  <div class="md:hidden flex items-center">
    <button onclick="changeDisplay()" class="outline-none mobile-menu-button">
    <svg class=" w-6 h-6 text-gray-500 hover:text-green-500 "
      x-show="!showMenu"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="2"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path d="M4 6h16M4 12h16M4 18h16"></path>
    </svg>
  </button>
  </div>
</div>
</div>
<!-- mobile menu -->
<div hidden id="mobile-menu">
<ul class="">
  <li class="active"><a href="index.html" class="block text-sm px-2 py-4 text-white bg-green-500 font-semibold">Home</a></li>
  <li><a href="#services" class="block text-sm px-2 py-4 hover:bg-green-500 transition duration-300">Services</a></li>
  <li><a href="#about" class="block text-sm px-2 py-4 hover:bg-green-500 transition duration-300">About</a></li>
  <li><a href="#contact" class="block text-sm px-2 py-4 hover:bg-green-500 transition duration-300">Contact Us</a></li>
</ul>
</div>
</header>
